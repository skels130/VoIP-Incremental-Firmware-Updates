<Directory "/var/www/html/yealink">
RewriteEngine on
RewriteBase "/yealink"
############################ Yealink ################################
# Stop upgrading once requested version is reached
RewriteCond "%{HTTP_USER_AGENT}" "^Yealink .* ([0-9]{2,3})\.([0-9]{2})\.([0-9]{1,3})\.([0-9]{1,3}).*"
RewriteRule "^%1\.%2\.%3\.%4\.rom$" "%1.%2.%3.%4.rom" [L]

############# AX83H, AX86H ##############
### 86.0.x ###
RewriteCond "%{HTTP_USER_AGENT}" "!^Yealink SIP-AX8[36]H (180)\.86\.0\..*"
RewriteRule ^ - [S=2]
RewriteRule "^(180)\.(86)\.0\.(\d{1,3})\.rom$" "$1\.$2\.0\.$3\.rom" [L]
RewriteRule "^(180)(?:.*?)\.rom$" "180\.87\.0\.5\.rom" [L]
### 87.0.5 ###
RewriteCond "%{HTTP_USER_AGENT}" "!^Yealink SIP-AX8[36]H (180)\.87\.0\.5.*"
RewriteRule ^ - [S=2]
RewriteRule "^(180)\.(8[67])\.0\.(\d{1,3})\.rom$" "$1\.$2\.0\.$3\.rom" [L]
RewriteRule "^(180)(?:.*?)\.rom$" "180\.87\.0\.5\.rom" [L]

############## CP960 ##############
### 80.x.x ###
RewriteCond "%{HTTP_USER_AGENT}" "^Yealink SIP-CP960 (73)\.80\..*"
