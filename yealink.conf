############## T31/T30/T30P/T31G/T31P/T33P/T33G ##############
# General format
# 1. Match current version inverted - skip next x rules if not matched, otherwise, don't skip
# 2. Match request for previous major version or prior minor release, give previous version firmware (not present in first rule, or where we don't have previous firmware)
# 3. Match request for same major (or unavailable previous) version number, allow requested file
# 4. Give next version number
### 85.X.X ###
RewriteCond "%{HTTP_USER_AGENT}" "!^Yealink SIP-T3[013][GP]? 124\.85\..*"
RewriteRule ^ - [S=2]
RewriteRule "^(124)\.(8[45])\.0\.(\d{2,3})\.rom$" "$1\.$2\.0\.$3\.rom" [L]
RewriteRule "^124(?:.*?)\.rom$" "124.86\.0\.40\.rom" [L]
### 86.0.40 ###
RewriteCond "%{HTTP_USER_AGENT}" "!^Yealink SIP-T3[013][GP]? 124\.86\.0\.40.*"
RewriteRule ^ - [S=2]
RewriteRule "^(124)\.(8[456])\.0\.(\d{2,3})\.rom$" "$1\.$2\.0\.$3\.rom" [L]
RewriteRule "^124(?:.*?)\.rom$" "124.86\.0\.75\.rom" [L]
### 86.0.75 ###
RewriteCond "%{HTTP_USER_AGENT}" "!^Yealink SIP-T3[013][GP]? 124\.86\.0\.75.*"
RewriteRule ^ - [S=3]
RewriteRule "^(124)\.8[4-6]\.0\.([1-3][0-9]|40)\.rom$" "$1\.86\.0\.40\.rom" [L]
RewriteRule "^(124)\.(86)\.0\.(4[1-9]|[56][0-9]|7[0-5])\.rom$" "$1\.$2\.0\.75\.rom" [L]
RewriteRule "^124(?:.*?).rom$" "124.87\.0\.15\.rom" [L]
### 87.0.15 ###
RewriteCond "%{HTTP_USER_AGENT}" "^!Yealink SIP-T3[013][GP]? 124\.87\..*"
RewriteRule ^ - [S=2]
RewriteRule "^(124)\.(8[4-6])\.0\.(\d{2})\.rom$" "$1\.86\.0\.75\.rom" [L]
RewriteRule "^124(?:.*?).rom$" "124.87\.0\.15\.rom" [L]

